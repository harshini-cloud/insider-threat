  {% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="card">
        <h2>Secure Login</h2>
        <form method="POST">
            <div class="form-group">
                <label>Email / Username</label>
                <input type="text" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Authenticate</button>
        </form>
    </div>
</div>
{% endblock %}

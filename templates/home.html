{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="card" style="max-width: 800px;">
        <h2>Welcome, {{ user.name }}</h2>
        <div class="grid-cards">
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;">
                <h4 style="color: var(--accent)">Occupation</h4>
                <p>{{ user.occupation }}</p>
            </div>
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;">
                <h4 style="color: var(--accent)">Email</h4>
                <p>{{ user.email }}</p>
            </div>
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;">
                <h4 style="color: var(--accent)">Status</h4>
                <p style="color: var(--success)">Active</p>
            </div>
        </div>
        
        <div style="margin-top: 30px; text-align: center;">
            <p style="margin-bottom: 15px;">Ready to scan for anomalies?</p>
            <a href="{{ url_for('predict') }}" class="btn" style="width: auto; padding: 15px 50px; animation: glow 2s infinite;">RUN PREDICTION</a>
        </div>
    </div>
</div>
{% endblock %}
